<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>工事書類管理 - プロ仕様</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <style>
        .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .chip-btn { 
            padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid #e2e8f0; 
            background-color: #fff; color: #1e293b; font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .chip-btn.active { 
            background-color: #0ea5e9; color: white; border-color: #0ea5e9; 
            box-shadow: 0 4px 8px rgba(14, 165, 233, 0.3); transform: translateY(-1px); 
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Search Bar moved -->

        <!-- Project List View -->
        <div id="project-list-view" class="view-content fade-in">
            <header class="app-header app-header-logo">
                <div class="app-logo-wrapper">
                    <h1 class="app-logo"><span>PRO</span>.DOC</h1>
                    <span class="logo-subtitle">SMART WORKFLOW</span>
                </div>
            </header>

            <!-- Search Bar moved below Logo -->
            <div id="search-container" class="search-container">
                <i class="search-icon">🔍</i>
                <input type="text" id="search-input" placeholder="書類を検索（会社名、監督名、現場名...）">
            </div>
            
            <nav id="tabs" class="tabs">
                <div class="tab active" data-tab="draft">下書き</div>
                <div class="tab" data-tab="sent">完了</div>
            </nav>

            <!-- Permanent Top Bulk Action Area -->
            <div id="top-bulk-container" class="top-bulk-container">
                <button class="btn btn-primary btn-bulk-top" id="btn-bulk-pdf-exec">
                    📄 複数選択してまとめてPDFを作成
                </button>
            </div>

            <div id="project-list" class="project-list"></div>
            <button class="fab-plus" id="fab-plus">+</button>
        </div>

        <!-- Calendar View (Independent Top-Level View) -->
        <div id="calendar-view" class="view calendar-container hidden" style="padding:15px;">
            <div id="calendar-header" class="calendar-header"></div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div id="calendar-day-list" class="calendar-day-list"></div>
        </div>

        <!-- Project Detail Detail View (Action Selector) -->
        <div id="project-detail-view" class="modal hidden" style="z-index: 1500;">
            <div class="modal-content detail-selector">
                <h2 id="detail-title">書類のアクション</h2>
                <div class="detail-info-summary" id="detail-summary-text"></div>
                <div class="detail-actions-grid">
                    <button class="btn btn-primary" id="btn-detail-pdf">📄 PDF作成</button>
                    <button class="btn btn-outline" id="btn-detail-edit">✏️ 再編集</button>
                    <button class="btn btn-danger" id="btn-detail-delete">🗑 削除</button>
                </div>
                <button class="btn btn-text" id="btn-close-detail">閉じる</button>
            </div>
        </div>

        <!-- Form View -->
        <div id="form-view" class="hidden">
            <header class="form-header">
                <button class="btn-back-styled" id="btn-back">←</button>
                <div class="form-header-logo-group">
                    <span class="logo-subtitle" style="color:#94a3b8; text-align:left;">PRO.DOC</span>
                    <h1 class="form-header-title" id="form-page-title">新規作成</h1>
                </div>
            </header>
            <div id="editor-container"></div>
        </div>

        <!-- Chatbot -->
        <div id="bot-container" class="bot-container hidden">
            <div class="bot-header">
                <span>ガイドボット</span>
                <button id="btn-close-bot">✕</button>
            </div>
            <div id="bot-messages" class="bot-messages">
                <div class="message bot">こんにちは！当社の書類作成ルールやアプリの使い方についてお答えします。知りたいことを入力するか、下のボタンを選んでください。</div>
            </div>
            <div class="bot-input-area">
                <input type="text" id="bot-input" placeholder="質問を入力...">
                <button id="btn-send-bot">送信</button>
            </div>
        </div>
        <button id="fab-bot" class="fab-secondary" title="ヘルプ">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 13.4876 3.36093 14.8914 4.00021 16.1272L3 21L7.8728 19.9998C9.10857 20.6391 10.5124 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Modal for New Project Type Selection -->
        <div id="type-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>作成する書類を選択</h2>
                <button class="btn btn-primary" id="btn-new-kanryo">完了報告書</button>
                <button class="btn btn-primary" id="btn-new-marusan">丸産技研報告書</button>
                <button class="btn btn-outline" id="btn-new-geppo">月報</button>
                <button class="btn btn-danger" id="btn-close-modal">キャンセル</button>
            </div>
        </div>

        <!-- Document Preview Overlay (Enhanced for Mobile) -->
        <div id="document-preview-overlay" class="modal hidden" style="z-index: 2000;">
            <div class="modal-content preview-modal-content">
                <div class="preview-header">
                    <h3 id="preview-title">出力プレビュー</h3>
                    <div class="preview-actions">
                        <button class="btn btn-primary" id="btn-preview-pdf-out">PDF出力</button>
                        <button class="btn btn-danger" id="btn-close-preview">閉じる</button>
                    </div>
                </div>
                <div id="preview-canvas-container" class="preview-body">
                    <!-- Canvas will be injected here -->
                </div>
            </div>
        </div>

        <!-- Document Scanner Overlay -->
        <div id="scanner-overlay" class="scanner-overlay hidden">
            <div class="scanner-header">
                <button class="btn btn-outline" id="btn-scanner-cancel">キャンセル</button>
                <span>領収書スキャン</span>
                <button class="btn btn-primary" id="btn-scanner-done">決定</button>
            </div>
            <div class="scanner-body" id="scanner-body">
                <img id="scanner-image" src="" style="max-width: 100%;">
            </div>
            <div class="scanner-footer">
                <button class="btn btn-outline" id="btn-scanner-rotate">🔄 回転</button>
                <button class="btn btn-outline" id="btn-scanner-filter">✨ 補正(白黒)</button>
            </div>
        </div>
    </div> <!-- end #app -->

    <!-- PDF Filename Modal -->
    <div id="pdf-filename-modal" class="modal-overlay hidden">
        <div class="modal-content scale-in">
            <h3 class="modal-title">PDF出力設定</h3>
            <div class="form-group">
                <label class="label">氏名 (保存されます)</label>
                <input type="text" id="pdf-user-name" placeholder="名前を入力">
            </div>
            <div class="form-group">
                <label class="label">書類種別</label>
                <select id="pdf-doc-type">
                    <option value="完了報告書">完了報告書</option>
                    <option value="月報">月報</option>
                    <option value="丸産報告書">丸産報告書</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="btn-pdf-cancel">キャンセル</button>
                <button class="btn btn-primary" id="btn-pdf-exec">出力する</button>
            </div>
        </div>
    </div>
    <script>
        window.APP_STARTUP_LOG = ["System boot started"];
        window.logBoot = function(msg) {
            window.APP_STARTUP_LOG.push(msg);
            console.log("[BOOT] " + msg);
        };
        
        function showFatalError(title, msg) {
            const div = document.getElementById('fatal-error-overlay') || document.createElement('div');
            div.id = 'fatal-error-overlay';
            div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);color:white;padding:20px;z-index:99999;font-family:monospace;overflow:auto;';
            div.innerHTML = `<h2 style="color:#ef4444;margin-top:0;">${title}</h2>
                <div style="background:#1e293b;padding:15px;border-radius:8px;margin:10px 0;">
                    <p style="color:#f87171;font-weight:bold;margin-top:0;">${msg}</p>
                    <p style="font-size:12px;color:#94a3b8;">Log Trace: ${window.APP_STARTUP_LOG.join(' → ')}</p>
                </div>
                <button onclick="window.location.reload()" style="background:#3b82f6;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;">再読み込みを試す</button>`;
            if (!document.getElementById('fatal-error-overlay')) document.body.appendChild(div);
        }

        window.addEventListener('error', function(e) {
            showFatalError('FATAL APP ERROR', e.message + ' (at ' + e.filename + ':' + e.lineno + ')');
        });
        window.addEventListener('unhandledrejection', function(e) {
            showFatalError('UNHANDLED PROMISE ERROR', e.reason ? (e.reason.message || e.reason) : 'Unknown async error');
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script type="module" src="main.js?v=20260426_v16"></script>
</body>
</html>
