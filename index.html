<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工事書類管理アプリ</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <style>
        .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .chip-btn { 
            padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid #e2e8f0; 
            background-color: #fff; color: #1e293b; font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .chip-btn.active { 
            background-color: #0ea5e9; color: white; border-color: #0ea5e9; 
            box-shadow: 0 4px 8px rgba(14, 165, 233, 0.3); transform: translateY(-1px); 
        }
        /* INDEPENDENT VIEW FORCED STYLE */
        .cropper-modal {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: #000 !important;
            z-index: 10000 !important;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        #update-banner-v5 {
            background: #ef4444; color: white; text-align: center; 
            padding: 12px; font-weight: 900; font-size: 1rem;
            position: sticky; top: 0; z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
    <script>
        // CRITICAL INLINE LOGIC TO BYPASS CACHE
        window.openCropperView = function() {
            const app = document.getElementById('app');
            const banner = document.getElementById('update-banner-v5');
            if (app) app.style.display = 'none';
            if (banner) banner.style.display = 'none';
            document.body.style.overflow = 'hidden';
            console.log("Independent Cropper View Opened");
        };
        window.closeCropperView = function() {
            const app = document.getElementById('app');
            const banner = document.getElementById('update-banner-v5');
            if (app) app.style.display = 'block';
            if (banner) banner.style.display = 'block';
            document.body.style.overflow = '';
            console.log("Independent Cropper View Closed");
        };
    </script>
</head>
<body>
    <div id="update-banner-v5">【最新版 v6.1 構造改革済み】領収書独立エディタ</div>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <button class="btn btn-outline" id="btn-back" style="display: none;">◀ 戻る</button>
            <h1 id="page-title">プロジェクト一覧</h1>
            <div id="header-actions">
                <a href="layout-editor.html" class="btn btn-outline" id="btn-settings-link" title="レイアウト設定ツール">⚙ 設定</a>
                <button class="btn btn-primary" id="btn-bulk-pdf" style="display: none;">まとめてPDF</button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="draft">下書き</button>
            <button class="tab" data-tab="sent">完了済み</button>
        </div>

        <!-- Main Content (List) -->
        <main class="project-list" id="project-list-view">
            <div id="project-list">
                <!-- Project cards will be rendered here -->
            </div>
        </main>

        <!-- Main Content (Form) -->
        <main class="form-view" id="form-view" style="display: none;">
            <!-- Form will be rendered here -->
        </main>


        <!-- Floating Action Button -->
        <button class="fab" id="fab-plus" title="新規作成">新規作成</button>

        <!-- Chatbot -->
        <div id="bot-container" class="bot-container hidden">
            <div class="bot-header">
                <span>ガイドボット</span>
                <button id="btn-close-bot">✕</button>
            </div>
            <div id="bot-messages" class="bot-messages">
                <div class="message bot">こんにちは！当社の書類作成ルールやアプリの使い方についてお答えします。知りたいことを入力するか、下のボタンを選んでください。</div>
            </div>
            <div class="bot-input-area">
                <input type="text" id="bot-input" placeholder="質問を入力...">
                <button id="btn-send-bot">送信</button>
            </div>
        </div>
        <button id="fab-bot" class="fab-secondary" title="ヘルプ">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 13.4876 3.36093 14.8914 4.00021 16.1272L3 21L7.8728 19.9998C9.10857 20.6391 10.5124 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Modal for New Project Type Selection -->
        <div id="type-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>作成する書類を選択</h2>
                <button class="btn btn-primary" id="btn-new-kanryo">完了報告書</button>
                <button class="btn btn-primary" id="btn-new-marusan">丸産技研報告書</button>
                <button class="btn btn-outline" id="btn-new-geppo">月報</button>
                <button class="btn btn-danger" id="btn-close-modal">キャンセル</button>
            </div>
        </div>

    </div> <!-- end #app -->

    <!-- Cropper Dedicated View (Native UI Match) -->
    <div id="cropper-modal" class="cropper-modal" style="display: none;">
        <div class="native-cropper-header">
            <button id="btn-cropper-cancel" class="native-icon-btn">←</button>
            <button class="native-icon-btn" style="opacity:0; pointer-events:none;">🗑</button>
        </div>
        
        <div class="cropper-container native-cropper-body">
            <img id="cropper-image" src="">
        </div>
        
        <div class="native-cropper-footer">
            <div class="footer-left">
                <button id="btn-cropper-reset" class="native-action-btn">
                    <span class="icon">⛶</span>
                    <span class="label">トリミングなし</span>
                </button>
            </div>
            <div class="footer-center">
                <button id="btn-cropper-rotate-left" class="native-action-btn">
                    <span class="icon">↺</span>
                    <span class="label">左</span>
                </button>
                <button id="btn-cropper-rotate-right" class="native-action-btn">
                    <span class="icon">↻</span>
                    <span class="label">右</span>
                </button>
            </div>
            <div class="footer-right">
                <button id="btn-cropper-confirm" class="native-btn-next">次へ ＞</button>
            </div>
        </div>
    </div>

    <script>
        // PROFESSIONAL OBSERVER LOGIC - Ensuring 100% Reliability
        (function() {
            const cropperModal = document.getElementById('cropper-modal');
            const mainApp = document.getElementById('app');
            const banner = document.getElementById('update-banner-v5');
            
            if (!cropperModal || !mainApp) return;

            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'style') {
                        const isVisible = cropperModal.style.display === 'flex';
                        if (isVisible) {
                            mainApp.style.display = 'none';
                            if (banner) banner.style.display = 'none';
                            document.body.style.backgroundColor = '#000';
                            console.log("Observer: UI Hidden for Cropping");
                        } else {
                            mainApp.style.display = 'block';
                            if (banner) banner.style.display = 'block';
                            document.body.style.backgroundColor = '';
                            console.log("Observer: UI Restored After Cropping");
                        }
                    }
                });
            });

            observer.observe(cropperModal, { attributes: true });
        })();
    </script>

    <script type="module" src="main.js?v=3.0"></script>
</body>
</html>
