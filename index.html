<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工事書類管理アプリ</title>
    <link rel="stylesheet" href="style.css?v=5.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <style>
        .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .chip-btn { 
            padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid #e2e8f0; 
            background-color: #fff; color: #1e293b; font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .chip-btn.active { 
            background-color: #0ea5e9; color: white; border-color: #0ea5e9; 
            box-shadow: 0 4px 8px rgba(14, 165, 233, 0.3); transform: translateY(-1px); 
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24">
        <!-- Dashboard View -->
        <div id="project-list-view">
            <header class="bg-white px-4 py-6 shadow-sm mb-6">
                <h1 class="text-2xl font-bold text-slate-800">工事書類管理</h1>
                <p class="text-slate-500 text-sm mt-1">現場での書類作成をスマートに</p>
            </header>

            <div id="tabs" class="px-4 mb-4 flex gap-4">
                <button class="tab active" data-tab="draft">下書き</button>
                <button class="tab" data-tab="sent">送信済み</button>
            </div>

            <main class="px-4" id="project-list">
                <div class="flex items-center justify-center py-20 text-slate-400">
                    <p>読み込み中...</p>
                </div>
            </main>

            <button id="btn-new-project" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>

        <!-- Document Form View -->
        <div id="form-view" style="display: none;">
            <header class="bg-white px-4 py-4 shadow-sm mb-4 flex items-center gap-4">
                <button id="btn-back" class="p-2 -ml-2 text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h2 id="page-title" class="text-lg font-bold text-slate-800">書類作成</h2>
            </header>

            <div id="editor-container" class="px-4">
                <!-- Dynamic form fields -->
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 max-w-md mx-auto">
                <button id="btn-save-draft" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-xl">下書き保存</button>
                <button id="btn-preview-doc" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">プレビュー</button>
            </div>
        </div>

        <!-- Chatbot FAB -->
        <button id="fab-bot" class="fixed bottom-6 right-24 w-12 h-12 bg-slate-800 text-white rounded-full shadow-lg flex items-center justify-center">
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor">
                <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 13.4876 3.36093 14.8914 4.00021 16.1272L3 21L7.8728 19.9998C9.10857 20.6391 10.5124 21 12 21Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Bot Container -->
        <div id="bot-container" class="fixed bottom-24 right-6 w-80 bg-white rounded-2xl shadow-2xl overflow-hidden hidden" style="z-index: 1000;">
            <div class="bg-slate-800 text-white p-4 flex justify-between items-center">
                <span class="font-bold">ガイドボット</span>
                <button id="btn-close-bot">✕</button>
            </div>
            <div id="bot-messages" class="h-64 overflow-y-auto p-4 flex flex-col gap-3"></div>
            <div class="p-4 border-t flex gap-2">
                <input type="text" id="bot-input" class="flex-1 border rounded-lg px-3 py-2 outline-none" placeholder="質問を入力...">
                <button id="btn-send-bot" class="bg-slate-800 text-white px-4 py-2 rounded-lg">送信</button>
            </div>
        </div>

        <!-- Type Modal -->
        <div id="type-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>作成する書類を選択</h2>
                <button class="btn btn-primary" id="btn-new-kanryo">完了報告書</button>
                <button class="btn btn-primary" id="btn-new-marusan">丸産技研報告書</button>
                <button class="btn btn-outline" id="btn-new-geppo">月報</button>
                <button class="btn btn-danger" id="btn-close-modal">キャンセル</button>
            </div>
        </div>

        <!-- PDF Preview Overlay -->
        <div id="document-preview-overlay" class="fixed inset-0 bg-black/90 z-[2000] hidden flex flex-col">
            <div class="p-4 flex justify-between items-center text-white">
                <span class="font-bold">書類プレビュー</span>
                <button id="btn-close-preview" class="text-2xl">✕</button>
            </div>
            <div id="preview-canvas-container" class="flex-1 overflow-auto p-4 flex items-start justify-center"></div>
        </div>
    </div>

    <script type="module" src="main.js?v=5.0"></script>
</body>
</html>
