<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>工事書類管理 - プロ仕様</title>
    <link rel="stylesheet" href="app-release.css?v=20260427_FINAL_STABLE_02">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <style>
        .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .chip-btn { 
            padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            background-color: rgba(154, 52, 18, 0.4); color: #ffedd5; font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .chip-btn.active { 
            background-color: var(--accent-gold); color: #431407; border-color: var(--accent-gold); 
            box-shadow: 0 4px 12px rgba(253, 224, 71, 0.3); transform: translateY(-1px); 
        }

        /* Multi-selection CSS removed for stability */

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 200000;
        }
        .modal-overlay.active { display: flex !important; }
        .hidden { display: none !important; }

        .card-selection-indicator {
            position: absolute !important; top: 15px !important; left: 10px !important;
            width: 28px !important; height: 28px !important;
            border: 2px solid var(--accent-gold) !important; border-radius: 50% !important;
            z-index: 100 !important; display: none; align-items: center; justify-content: center;
            background: white !important; font-weight: bold !important; color: transparent !important;
        }
        .card-selection-indicator.selection-mode-active { display: flex !important; }
        .card-selection-indicator.selected { background: var(--accent-gold) !important; color: white !important; }

        .sticky-bottom-bar {
            position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important;
            background: rgba(255, 255, 255, 0.98) !important; backdrop-filter: blur(20px) !important;
            padding: 12px 15px !important; box-shadow: 0 -10px 40px rgba(0,0,0,0.15) !important;
            z-index: 10000 !important; border-top: 1px solid rgba(0,0,0,0.08) !important;
        }

        .report-btn:active { transform: scale(0.9); }

        /* --- New Robust Selection UI --- */
        body.selection-mode .project-card-body { padding-left: 15px !important; }
        body.selection-mode .selection-trigger-container { display: none !important; }
        body.selection-mode #selection-bar-container { display: flex !important; pointer-events: auto !important; }
        
        #selection-bar-container {
            display: none;
            position: fixed; bottom: 20px; left: 0; width: 100%;
            justify-content: center; z-index: 10000; pointer-events: none;
        }
        
        .project-card.selected { border: 2px solid var(--accent-gold) !important; background: rgba(253, 224, 71, 0.1) !important; }
    </style>
</head>
<body class="loading-state">
    <div id="app">
        <!-- Force Refresh & Version UI removed -->

        <!-- Global Navigation Wrapper -->
        <div id="global-nav">
            <header class="app-header app-header-logo" id="main-app-header">
                <div class="header-top-bar" style="position: relative; padding: 0 10px;">
                    <div class="app-logo-wrapper" onclick="window.switchTab('draft')" style="cursor:pointer; flex:1; display: flex; align-items: center; justify-content: center; padding: 10px 0;">
                        <div style="position: relative; width: 280px; height: 80px; display: flex; align-items: center; justify-content: center;">
                            <!-- Logo Illustration -->
                            <img src="app_logo.png" style="position: absolute; left: 0; height: 70px; width: 70px; border-radius: 50%; object-fit: cover; filter: brightness(0.8) contrast(1.1) drop-shadow(0 0 10px rgba(181, 154, 93, 0.3));">
                            
                            <!-- Designed Title Text -->
                            <div style="margin-left: 60px; display: flex; flex-direction: column; align-items: flex-start;">
                                <div style="display: flex; align-items: baseline;">
                                    <span style="font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 28px; color: var(--accent-gold); letter-spacing: 4px;">おやすみ</span>
                                    <span style="font-family: 'Noto Serif JP', serif; font-weight: 300; font-size: 18px; color: var(--text-primary); margin-left: 5px; opacity: 0.6;">の</span>
                                </div>
                                <div style="margin-top: -5px;">
                                    <span style="font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 32px; color: var(--text-primary); letter-spacing: 8px;">宛先</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Feedback button removed -->
                </div>
            </header>

            <div id="search-container" class="search-container">
                <i class="search-icon">🔍</i>
                <input type="text" id="search-input" placeholder="書類を検索（会社名、監督名、現場名...）">
            </div>
            
            <nav id="tabs" class="tabs">
                <div class="tab active" data-tab="draft">下書き</div>
                <div class="tab" data-tab="sent">完了</div>
            </nav>
        </div>

        <!-- Project List View -->
        <div id="project-list-view" class="view-container fade-in">
            <!-- Permanent Top Bulk Action Area -->
            <div id="top-bulk-container" class="top-bulk-container">
                <div class="bulk-btns-row" style="justify-content: center;">
                    <button class="btn btn-primary" onclick="window.showTypeModal()" style="background: var(--accent-gold); color: white; font-weight: bold; padding: 12px 25px; font-size: 1rem; width: 100%; max-width: 300px; border-radius: 14px; box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);">
                        ➕ 新規作成
                    </button>
                </div>
            </div>

            <div id="project-list" class="project-list" style="padding-bottom: 120px !important;"></div>
            
            <!-- Selection Action Bar Area -->
            <div id="selection-bar-container" class="selection-bar-container"></div>
        </div>

        <!-- Calendar View (Independent Top-Level View) -->
        <div id="calendar-view" class="view-container calendar-container hidden" style="padding:15px;">
            <div id="calendar-header" class="calendar-header"></div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div id="calendar-day-list" class="calendar-day-list"></div>
        </div>

        <!-- Project Detail Detail View (Action Selector) -->
        <div id="project-detail-view" class="modal hidden" style="z-index: 1500;">
            <div class="modal-content detail-selector">
                <h2 id="detail-title">書類のアクション</h2>
                <div class="detail-info-summary" id="detail-summary-text"></div>
                <div class="detail-actions-grid">
                    <button class="btn btn-primary" id="btn-detail-pdf">📄 PDF作成</button>
                    <button class="btn btn-outline" id="btn-detail-edit">✏️ 再編集</button>
                    <button class="btn btn-danger" id="btn-detail-delete">🗑 削除</button>
                </div>
                <button class="btn btn-text" id="btn-close-detail">閉じる</button>
            </div>
        </div>

        <!-- Form View -->
        <div id="form-view" class="view-container hidden">
            <header class="form-header">
                <button class="btn-back-styled" id="btn-back">←</button>
                <div class="form-header-logo-group">
                    <span class="logo-subtitle" style="color:#94a3b8; text-align:left;">PRO.DOC</span>
                    <h1 class="form-header-title" id="form-page-title">新規作成</h1>
                </div>
            </header>
            <div id="editor-container"></div>
        </div>

        <!-- Chatbot -->
        <div id="bot-container" class="bot-container hidden">
            <div class="bot-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button id="btn-report-issue-bot" style="background:none; border:none; font-size:1.2rem; cursor:pointer; padding:4px;">📮</button>
                    <span>おやすみの案内人</span>
                </div>
                <button id="btn-close-bot">×</button>
            </div>
            <div id="bot-messages" class="bot-messages"></div>
            <div class="bot-input-area">
                <input type="text" id="bot-input" placeholder="質問を入力...">
                <button id="btn-send-bot">送信</button>
            </div>
        </div>
        <button id="fab-bot" class="fab-secondary" title="ヘルプ">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 13.4876 3.36093 14.8914 4.00021 16.1272L3 21L7.8728 19.9998C9.10857 20.6391 10.5124 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Modal for New Project Type Selection -->
        <div id="type-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>作成する書類を選択</h2>
                <button class="btn btn-primary" id="btn-new-kanryo">完了報告書</button>
                <button class="btn btn-primary" id="btn-new-marusan">丸産技研報告書</button>
                <button class="btn btn-primary" id="btn-new-geppo">月報</button>
                <button class="btn btn-danger" id="btn-close-modal">キャンセル</button>
            </div>
        </div>

        <!-- Document Preview Overlay (Enhanced for Mobile) -->
        <div id="document-preview-overlay" class="modal hidden" style="z-index: 2000;">
            <div class="modal-content preview-modal-content">
                <div class="preview-header">
                    <h3 id="preview-title">出力プレビュー</h3>
                    <div class="preview-actions">
                        <button class="btn btn-danger" id="btn-close-preview" style="min-width: 100px;">✕ 閉じる</button>
                    </div>
                </div>
                <div id="preview-canvas-container" class="preview-body">
                    <!-- Canvas will be injected here -->
                </div>
            </div>
        </div>

        <!-- Document Scanner Overlay -->
        <div id="scanner-overlay" class="scanner-overlay hidden">
            <div class="scanner-header">
                <button class="btn btn-outline" id="btn-scanner-cancel">キャンセル</button>
                <span>領収書スキャン</span>
                <button class="btn btn-primary" id="btn-scanner-done">決定</button>
            </div>
            <div class="scanner-body" id="scanner-body">
                <img id="scanner-image" src="" style="max-width: 100%;">
            </div>
            <div class="scanner-footer">
                <button class="btn btn-outline" id="btn-scanner-rotate">🔄 回転</button>
                <button class="btn btn-outline" id="btn-scanner-filter">✨ 補正(白黒)</button>
            </div>
        </div>
    </div> <!-- end #app -->

    <!-- PDF Filename Modal -->
    <div id="pdf-filename-modal" class="modal-overlay hidden">
        <div class="modal-content scale-in">
            <h3 class="modal-title">PDF出力設定</h3>
            <div class="form-group">
                <label class="label">氏名 (保存されます)</label>
                <input type="text" id="pdf-user-name" placeholder="名前を入力">
            </div>
            <div class="form-group">
                <label class="label">書類種別</label>
                <select id="pdf-doc-type">
                    <option value="完了報告書">完了（丸産含む）</option>
                    <option value="月報">月報</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="btn-pdf-cancel">キャンセル</button>
                <button class="btn btn-primary" id="btn-pdf-exec">出力する</button>
            </div>
        </div>
    <script>
        window.APP_STARTUP_LOG = ["System boot started"];
        window.logBoot = function(msg) {
            window.APP_STARTUP_LOG.push(msg);
            console.log("[BOOT] " + msg);
        };
        
        function showFatalError(title, msg) {
            const div = document.getElementById('fatal-error-overlay') || document.createElement('div');
            div.id = 'fatal-error-overlay';
            div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);color:white;padding:20px;z-index:99999;font-family:monospace;overflow:auto;';
            div.innerHTML = `<h2 style="color:#ef4444;margin-top:0;">${title}</h2>
                <div style="background:#1e293b;padding:15px;border-radius:8px;margin:10px 0;">
                    <p style="color:#f87171;font-weight:bold;margin-top:0;">${msg}</p>
                    <p style="font-size:12px;color:#94a3b8;">Log Trace: ${window.APP_STARTUP_LOG.join(' → ')}</p>
                </div>
                <button onclick="window.location.reload()" style="background:#3b82f6;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;">再読み込みを試す</button>`;
            if (!document.getElementById('fatal-error-overlay')) document.body.appendChild(div);
        }

        window.addEventListener('error', function(e) {
            showFatalError('FATAL APP ERROR', e.message + ' (at ' + e.filename + ':' + e.lineno + ')');
        });
        window.addEventListener('unhandledrejection', function(e) {
            showFatalError('UNHANDLED PROMISE ERROR', e.reason ? (e.reason.message || e.reason) : 'Unknown async error');
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./src/pdf-engine-global.js?v=6"></script>
    <!-- Healing Letter Modal v32 -->
    <div id="healing-modal" class="healing-overlay">
        <div class="healing-letter-paper">
            <div class="photo-frame">
                <img src="healing_landscape.png" class="healing-bg-img" id="healing-img">
            </div>
            <div class="letter-body">
                <div class="healing-message" id="healing-text">
                    お疲れ様でした。あなたの努力は、きっと誰かの力になっています。
                </div>
                <div style="font-size: 0.7rem; color: #9a3412; opacity: 0.6; margin-top: 20px; text-align: center; border-top: 1px dashed rgba(154, 52, 18, 0.2); padding-top: 10px;">
                    PDFを出力中です。データは完了タブに移動しました
                </div>
            </div>
            <button class="btn-heal-close" id="btn-close-healing">手紙を閉じる</button>
        </div>
    </div>

    <!-- Bug Report Modal -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>📭 不具合・改善要望の報告</h3>
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px;">
                お気づきの点やご要望を教えてください。
            </p>
            <div class="form-group">
                <textarea id="report-text" 
                    oninput="document.getElementById('btn-report-send-link').href = 'mailto:kmk7531.hmk.runner@gmail.com?subject=' + encodeURIComponent('【おやすみの宛先】不具合・要望報告') + '&body=' + encodeURIComponent(this.value);"
                    rows="6" placeholder="報告内容を詳しく記入してください" style="width: 100%; border-radius: 12px; padding: 12px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="btn-report-cancel">キャンセル</button>
                <a id="btn-report-send-link" href="mailto:kmk7531.hmk.runner@gmail.com" target="_blank" class="btn btn-primary" style="display: flex; align-items: center; justify-content: center; text-decoration: none; flex: 1;">報告を送信する</a>
            </div>
        </div>
    </div>

    <!-- Bulk Action Bar Container managed by main-v2.js -->

    <div id="app-version-tag" style="position:fixed; bottom:2px; left:5px; font-size:10px; color:white; z-index:99999; pointer-events:none; background:#ef4444; padding:4px 8px; border-radius:4px; font-weight:bold; box-shadow:0 0 10px rgba(239,68,68,0.5);">v20260428_ULTRA_v5.0.0 (NEW ENGINE)</div>
    <script type="module" src="./main-v2.js?t=1714316000"></script>
    <script>
        // Emergency Override for Bot Greeting
        window.addEventListener('DOMContentLoaded', () => {
            const checkBot = setInterval(() => {
                const botMsgContainer = document.getElementById('bot-messages');
                if (botMsgContainer) {
                    if (botMsgContainer.children.length === 0) {
                        const div = document.createElement('div');
                        div.className = 'message bot';
                        div.innerText = "【システム案内】お疲れ様です！(v4.0.0-REVOLUTION)\n案内に沿って番号を選んでください。\n\n(1) 使い方\n(2) 会社ルール（丸産など）\n(3) 駐車場原本が必要な会社\n(4) 📮不具合報告・要望";
                        botMsgContainer.appendChild(div);
                    }
                    clearInterval(checkBot);
                }
            }, 1000);

            // Global Feedback Modal Trigger
            window.openReportModal = () => {
                const modal = document.getElementById('report-modal');
                if (modal) {
                    modal.classList.add('active');
                    modal.classList.remove('hidden');
                }
            };
        });
    </script>
</body>
</html>
