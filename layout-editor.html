<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印字レイアウト設定ツール</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #e2e8f0; }
        .editor-page { display: flex; flex-direction: column; height: 100vh; }
        .editor-header { 
            background: #fff; padding: 1rem; border-bottom: 1px solid #cbd5e1; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .editor-main { flex: 1; display: flex; overflow: hidden; }
        .canvas-container { 
            flex: 1; overflow: auto; padding: 2rem; display: flex; 
            flex-direction: column; align-items: center; /* Center horizontally */
            background: #cbd5e1; position: relative;
        }
        .config-panel { 
            width: 350px; background: #fff; border-left: 1px solid #cbd5e1; 
            padding: 1.5rem; overflow-y: auto; box-shadow: -4px 0 12px rgba(0,0,0,0.05);
            flex-shrink: 0; /* Don't shrink panel */
        }
        
        /* Layout Editor Canvas Area Specific */
        .editor-canvas-area {
            background: white; border: 1px solid #94a3b8; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 800px; /* Base width */
            aspect-ratio: 2480 / 3508; /* Perfect A4 Ratio */
            position: relative; 
            margin: 0 auto; 
            transform-origin: top center;
            flex-shrink: 0; /* CRITICAL: Prevent squashing */
        }

        /* Ensure img/canvas inside editor-canvas-area are correct */
        .editor-canvas-area img, .editor-canvas-area canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0; left: 0;
            object-fit: contain;
        }

        .helper-text { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; }
        .zoom-controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 2000; }
        
        .preview-active .draggable-label { 
            background: transparent; 
            border-color: transparent; 
            color: transparent; 
        }
        .preview-active .draggable-label.active { 
            border-color: rgba(14, 165, 233, 0.5); 
            border-style: solid; 
            background: rgba(14, 165, 233, 0.05);
        }
        .preview-active .draggable-label:hover {
            border-color: rgba(14, 165, 233, 0.3);
            border-style: dashed;
        }

        @media (max-width: 768px) {
            .editor-main { flex-direction: column; }
            .config-panel { width: 100%; height: 50%; border-left: none; border-top: 1px solid #cbd5e1; }
        }
    </style>
</head>
<body>
    <div class="editor-page">
        <header class="editor-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="btn btn-outline">◀ アプリに戻る</a>
                <h1 style="font-size: 1.2rem; margin: 0;">印字レイアウト設定ツール</h1>
            </div>
            <button class="btn btn-primary" id="btn-save-layout">設定を保存する</button>
        </header>

        <main class="editor-main">
            <div class="canvas-container" id="canvas-container">
                <div id="editor-canvas-area" class="editor-canvas-area">
                    <img id="editor-template-img" src="">
                    <!-- Canvas and Labels will be here -->
                </div>
                
                <div class="zoom-controls">
                    <button class="btn btn-outline" id="btn-zoom-out">ー</button>
                    <span id="zoom-val" style="align-self: center; font-weight: bold; background: white; padding: 4px 8px; border-radius: 4px;">100%</span>
                    <button class="btn btn-outline" id="btn-zoom-in">＋</button>
                </div>
            </div>

            <aside class="config-panel">
                <div class="form-group">
                    <label class="label">調整する書類</label>
                    <select id="editor-type-select">
                        <option value="kanryo">完了報告書</option>
                        <option value="marusan">丸産技研報告書</option>
                        <option value="geppo">月報</option>
                    </select>
                </div>
                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #e2e8f0;">

                <div class="control-group">
                    <label class="label">プレビュー表示</label>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-outline btn-sm active" id="btn-show-labels">ラベル</button>
                        <button class="btn btn-outline btn-sm" id="btn-show-real">本番(PDF)</button>
                    </div>
                </div>

                <div id="field-settings" class="hidden">
                    <div style="margin-top: 1.5rem;">
                        <span id="selected-field-name" style="font-weight: bold; color: var(--accent-gold);">項目を選択してください</span>
                    </div>

                    <div class="control-group" style="margin-top: 15px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div>
                                <label class="label">X座標 (%)</label>
                                <div class="step-input">
                                    <button class="btn-step" data-dir="down" data-target="x">-</button>
                                    <input type="number" id="input-x" step="0.1" value="0">
                                    <button class="btn-step" data-dir="up" data-target="x">+</button>
                                </div>
                            </div>
                            <div>
                                <label class="label">Y座標 (%)</label>
                                <div class="step-input">
                                    <button class="btn-step" data-dir="down" data-target="y">-</button>
                                    <input type="number" id="input-y" step="0.1" value="0">
                                    <button class="btn-step" data-dir="up" data-target="y">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="control-group" style="margin-top: 10px;">
                        <label class="label">フォントサイズ</label>
                        <div class="step-input">
                            <button class="btn-step" data-dir="down" data-target="font">-</button>
                            <input type="number" id="input-font" step="1" value="12">
                            <button class="btn-step" data-dir="up" data-target="font">+</button>
                        </div>
                        <input type="range" id="font-size-slider" min="6" max="30" step="1" style="margin-top: 5px;">
                    </div>

                    <div class="control-group" style="margin-top: 10px;">
                        <label class="label">枠の横幅 (%)</label>
                        <div class="step-input">
                            <button class="btn-step" data-dir="down" data-target="width">-</button>
                            <input type="number" id="input-width" step="1" value="30">
                            <button class="btn-step" data-dir="up" data-target="width">+</button>
                        </div>
                        <input type="range" id="width-size-slider" min="5" max="95" step="1" style="margin-top: 5px;">
                    </div>
                    
                    <div class="control-group" style="margin-top: 10px;">
                        <label class="label">文字の揃え</label>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-outline btn-sm" id="btn-align-left">左揃え</button>
                            <button class="btn btn-outline btn-sm" id="btn-align-center">中央揃え</button>
                        </div>
                    </div>
                    
                    <p class="helper-text">※ 矢印キー（↑↓←→）でも微調整できます。</p>
                </div>
                
                <div id="no-selection-msg" style="margin-top: 2rem; text-align: center; color: #94a3b8;">
                    キャンバス上の項目をタップして調整を開始してください。
                </div>

                <div style="margin-top: 2rem;">
                    <button class="btn btn-outline" id="btn-export-config" style="width: 100%;">設定データをダウンロード</button>
                    <button class="btn btn-outline" id="btn-reset-layout" style="width: 100%; margin-top: 0.5rem; color: #ef4444;">デフォルトに戻す</button>
                </div>
            </aside>
        </main>
    </div>

    <script type="module" src="editor.js"></script>
</body>
</html>
